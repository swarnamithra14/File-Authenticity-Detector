<!DOCTYPE html>
<html>
<head>
    <title>File Authenticity Detector</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #ffffff;
        }

        /* Navbar */
        header {
            background: #3b0a6b; /* deep purple */
            color: white;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: 500;
        }

        /* Layout */
        .main {
            height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card */
        .card {
            background: #4b0082; /* dark purple */
            padding: 40px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
            color: white;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }

        .card h1 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 20px 0;
            color: white;
        }

        button {
            background: white;
            color: #4b0082;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e6e6e6;
        }

    </style>
</head>

<body>

<header>
    File Authenticity Detector
</header>

<div class="main">
    <div class="card">
        <h1>Upload File</h1>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <br>
            <button type="submit">Check Authenticity</button>
        </form>
    </div>
</div>

</body>
</html>
